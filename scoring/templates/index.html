<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <title>Olympiad Scorer</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 32px; color: #151515; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
      a { color: #0755c7; }
    </style>
  </head>
  <body>
    <h1>Прогоны</h1>
    <table>
      <thead>
        <tr><th>Run ID</th><th>Дата</th><th>Задача</th><th>Ответов</th></tr>
      </thead>
      <tbody>
        {% for run in runs %}
          <tr>
            <td><a href="{{ url_for('review_run', run_id=run.run_id) }}">{{ run.run_id }}</a></td>
            <td>{{ run.timestamp }}</td>
            <td>{{ run.problem_file }}</td>
            <td>{{ run.count }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
