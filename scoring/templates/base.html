<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Olympiad Scorer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ee;
      --ink: #1d2329;
      --muted: #66707a;
      --line: #d8d2c5;
      --panel: #fffdf8;
      --accent: #0d6b5f;
      --accent-ink: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #fbfaf6 0%, var(--bg) 42%, #eef3f1 100%);
      color: var(--ink);
      font-family: ui-serif, Georgia, "Times New Roman", serif;
      line-height: 1.5;
    }
    header, main { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
    header { padding: 34px 0 22px; }
    h1 { margin: 0; font-size: clamp(30px, 4vw, 54px); line-height: 1; letter-spacing: 0; }
    h2 { margin: 0 0 12px; font-size: 24px; }
    a { color: var(--accent); text-decoration-thickness: 1px; text-underline-offset: 3px; }
    .crumbs { margin-top: 12px; color: var(--muted); font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .card {
      display: block;
      padding: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(29, 35, 41, 0.06);
    }
    .meta, .stats {
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 14px;
    }
    .stats { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
    .empty { padding: 24px; border: 1px dashed var(--line); border-radius: 8px; background: rgba(255, 253, 248, 0.65); }
    .stack { display: grid; gap: 18px; }
    .paper {
      padding: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(29, 35, 41, 0.05);
    }
    .paper h2, .paper h3 { margin-top: 0; }
    .rendered {
      font-size: 18px;
      overflow-wrap: anywhere;
    }
    .rendered h1, .rendered h2, .rendered h3 {
      margin: 22px 0 10px;
      line-height: 1.18;
    }
    .rendered h1:first-child, .rendered h2:first-child, .rendered h3:first-child { margin-top: 0; }
    .rendered p { margin: 0 0 14px; }
    .rendered ul, .rendered ol { padding-left: 24px; }
    .rendered code {
      padding: 2px 5px;
      border-radius: 5px;
      background: #ece7dc;
      font-size: 0.9em;
    }
    .rendered pre code { padding: 0; background: transparent; }
    .result-head {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }
    details { margin-top: 16px; }
    summary { cursor: pointer; color: var(--accent); font-family: ui-sans-serif, system-ui, sans-serif; font-weight: 700; }
    pre {
      overflow: auto;
      padding: 18px;
      background: #17201e;
      color: #edf6f2;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.45;
    }
    .score-form { margin-top: 18px; padding: 18px; background: #f8f5ed; border: 1px solid var(--line); border-radius: 8px; }
    .score-form h3 { margin: 0 0 14px; font-family: ui-sans-serif, system-ui, sans-serif; font-size: 18px; }
    label { display: block; margin-bottom: 6px; font-family: ui-sans-serif, system-ui, sans-serif; font-weight: 700; }
    input, textarea {
      width: 100%;
      margin-bottom: 14px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font: inherit;
      background: #ffffff;
    }
    textarea { min-height: 180px; resize: vertical; }
    button {
      width: auto;
      min-width: 180px;
      padding: 11px 14px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: var(--accent-ink);
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-weight: 700;
      cursor: pointer;
    }
    @media (max-width: 820px) {
      header, main { width: min(100% - 24px, 1120px); }
      .result-head { display: block; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Olympiad Scorer</h1>
    <div class="crumbs">{% block crumbs %}<a href="{{ url_for('index') }}">Competitions</a>{% endblock %}</div>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
      startup: { typeset: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <script>
    function escapeHtml(value) {
      return value
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function protectMath(source) {
      const chunks = [];
      const pattern = /(\$\$[\s\S]+?\$\$|\\\[[\s\S]+?\\\]|\\\([\s\S]+?\\\))/g;
      const protectedSource = source.replace(pattern, (match) => {
        const token = `@@MATH_${chunks.length}@@`;
        chunks.push(match);
        return token;
      });
      return { protectedSource, chunks };
    }

    function restoreMath(html, chunks) {
      return html.replace(/@@MATH_(\d+)@@/g, (_, index) => {
        return escapeHtml(chunks[Number(index)] || '');
      });
    }

    document.querySelectorAll('[data-markdown]').forEach((node) => {
      const source = node.textContent || '';
      const { protectedSource, chunks } = protectMath(source);
      const rendered = window.marked ? marked.parse(protectedSource) : escapeHtml(protectedSource);
      const sanitized = window.DOMPurify ? DOMPurify.sanitize(rendered) : rendered;
      node.innerHTML = restoreMath(sanitized, chunks);
    });
    if (window.MathJax) {
      MathJax.startup.promise.then(() => MathJax.typesetPromise(document.querySelectorAll('[data-markdown]')));
    }
  </script>
</body>
</html>
