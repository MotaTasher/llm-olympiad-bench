<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Olympiad Scorer{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f5;
      --panel: #ffffff;
      --ink: #202428;
      --muted: #68717a;
      --line: #d9dde1;
      --soft: #eef1f3;
      --accent: #176c72;
      --accent-ink: #ffffff;
      --error: #f1f2f3;
      --zero: #f8d8d5;
      --partial: #f7e7b0;
      --full: #cfe8d5;
      --warn: #7d4b00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(247, 247, 245, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }
    .topbar, main { width: min(1440px, calc(100% - 32px)); margin: 0 auto; }
    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 300px);
      gap: 16px;
      align-items: end;
      padding: 14px 0 12px;
    }
    .brand { margin: 0 0 4px; font-size: 20px; line-height: 1.2; font-weight: 750; letter-spacing: 0; }
    .crumbs { color: var(--muted); font-size: 14px; }
    .reviewer-control label { font-size: 12px; color: var(--muted); }
    main { padding: 18px 0 40px; }
    a { color: var(--accent); text-underline-offset: 3px; }
    a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, .matrix-cell:focus-visible {
      outline: 3px solid rgba(23, 108, 114, 0.35);
      outline-offset: 2px;
    }
    h1, h2, h3 { margin: 0; line-height: 1.2; letter-spacing: 0; }
    h1 { font-size: 26px; }
    h2 { font-size: 20px; }
    h3 { font-size: 16px; }
    .muted, .meta { color: var(--muted); font-size: 13px; }
    .stack { display: grid; gap: 16px; min-width: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; min-width: 0; }
    .card, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .card {
      display: block;
      padding: 16px;
      color: inherit;
      text-decoration: none;
    }
    .card:hover { border-color: #9fb5b8; }
    .card-title { display: flex; justify-content: space-between; gap: 12px; align-items: start; }
    .stats { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--soft);
      color: #394149;
      font-size: 12px;
      white-space: nowrap;
    }
    .progress {
      height: 8px;
      margin-top: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--soft);
    }
    .progress span { display: block; height: 100%; background: var(--accent); }
    .empty, .warning {
      padding: 14px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fffdf7;
      color: var(--muted);
    }
    .warning { border-color: #e3bb76; color: var(--warn); }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      max-height: calc(100vh - 145px);
    }
    table { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; }
    th, td { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 8px; vertical-align: middle; }
    th { position: sticky; top: 0; z-index: 3; background: #f0f3f4; font-size: 12px; text-align: left; }
    th:first-child, td:first-child { position: sticky; left: 0; z-index: 2; background: var(--panel); min-width: 260px; max-width: 340px; }
    th:first-child { z-index: 4; background: #f0f3f4; }
    .problem-link { color: inherit; font-weight: 700; text-decoration: none; }
    .problem-link:hover { color: var(--accent); text-decoration: underline; }
    .matrix-cell {
      display: grid;
      place-items: center;
      min-width: 88px;
      min-height: 44px;
      border-radius: 6px;
      color: #1f252b;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    .matrix-cell:hover { filter: brightness(0.97); }
    .cell-not-run { background: #eef0f1; color: #68717a; }
    .cell-error { background: var(--error); color: #333a40; border-style: dashed; }
    .cell-unscored { background: #ffffff; }
    .cell-zero { background: var(--zero); }
    .cell-partial { background: var(--partial); }
    .cell-full { background: var(--full); }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
      align-items: start;
      min-width: 0;
    }
    .review-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
      align-items: start;
      min-width: 0;
    }
    .answer-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
      align-items: start;
      min-width: 0;
    }
    .panel { padding: 16px; min-width: 0; }
    .rendered {
      max-width: 78ch;
      overflow-wrap: break-word;
      font-family: ui-serif, Georgia, "Times New Roman", serif;
      font-size: 18px;
      line-height: 1.65;
    }
    .scrollable-content {
      max-width: 100%;
      min-width: 0;
      overflow-x: auto;
      overflow-y: visible;
      overflow-wrap: break-word;
      word-break: normal;
    }
    .scrollable-content > * { max-width: 100%; }
    .scrollable-content pre {
      max-width: 100%;
      overflow-x: auto;
      white-space: pre;
    }
    .scrollable-content code { overflow-wrap: anywhere; }
    .scrollable-content table {
      display: block;
      width: max-content;
      min-width: 0;
      max-width: 100%;
      overflow-x: auto;
    }
    .scrollable-content mjx-container,
    .scrollable-content .MathJax {
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .rendered p { margin: 0 0 14px; }
    .rendered h1, .rendered h2, .rendered h3 { margin: 20px 0 10px; }
    .rendered code { background: var(--soft); border-radius: 4px; padding: 1px 4px; }
    .model-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
    .model-tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: inherit;
      text-decoration: none;
      font-size: 12px;
      white-space: nowrap;
    }
    .model-tab[aria-current="true"] { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
    .metric-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin: 12px 0; }
    .metric { padding: 8px; border: 1px solid var(--line); border-radius: 6px; background: #fafbfb; }
    .metric b { display: block; font-size: 11px; color: var(--muted); font-weight: 650; }
    .attempt-switcher {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 10px;
      margin: 12px 0;
      border-bottom: 1px solid var(--line);
    }
    .attempt-chip {
      display: grid;
      gap: 2px;
      min-width: 190px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: inherit;
      text-decoration: none;
      font-size: 12px;
    }
    .attempt-chip b { color: var(--accent); }
    .attempt-chip span, .attempt-chip em {
      overflow: hidden;
      color: var(--muted);
      font-style: normal;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .attempt-chip.active, .attempt-card.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
      background: #f4fbfa;
    }
    .attempt-list { display: grid; gap: 10px; }
    .attempt-card {
      display: block;
      padding: 14px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fffdf7;
      color: inherit;
      text-decoration: none;
    }
    .attempt-card:hover, .attempt-chip:hover { border-color: #9fb5b8; }
    .attempt-sidebar {
      max-height: none;
      overflow: visible;
    }
    .attempt-sidebar .attempt-switcher {
      display: flex;
      flex-wrap: wrap;
      overflow-x: auto;
      overflow-y: visible;
      padding: 0;
      margin: 12px 0;
      border-bottom: 0;
    }
    .attempt-sidebar .attempt-chip {
      min-width: 140px;
      width: auto;
    }
    .attempt-sidebar .button {
      width: auto;
      margin-top: 8px;
    }
    .result-head {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .anonymous-answer {
      scroll-margin-top: 90px;
    }
    .score-form { display: grid; gap: 10px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
    .form-help { color: var(--warn); font-size: 13px; }
    label { display: grid; gap: 5px; font-size: 13px; font-weight: 700; }
    input, textarea {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
    }
    textarea { min-height: 120px; resize: vertical; }
    button, .button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: var(--accent-ink);
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .button.secondary, button.secondary { background: #ffffff; color: var(--accent); }
    .quick { display: flex; flex-wrap: wrap; gap: 6px; }
    .quick button { min-height: 30px; padding: 4px 9px; }
    .csv-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: end;
      margin-top: 12px;
    }
    .csv-actions form {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .csv-actions input[type="file"] {
      width: auto;
      max-width: 280px;
      padding: 6px;
    }
    .section-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 12px;
    }
    .calculator-form {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(150px, 220px) auto;
      gap: 10px;
      align-items: end;
    }
    .calculator-form label:first-of-type {
      grid-template-columns: minmax(0, 1fr) 120px;
      align-items: end;
    }
    .calculator-form label:first-of-type span {
      grid-column: 1 / -1;
    }
    .calculator-form input[type="range"] {
      padding: 0;
      accent-color: var(--accent);
    }
    .cost-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
      margin: 12px 0;
    }
    .cost-summary .metric {
      margin: 0;
      min-height: 58px;
    }
    .cost-summary .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }
    .compact-table {
      max-height: 360px;
    }
    .compact-table th:first-child,
    .compact-table td:first-child {
      min-width: 130px;
      max-width: 180px;
    }
    .evaluation-list {
      display: grid;
      gap: 8px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .evaluation-card {
      display: grid;
      gap: 6px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fafbfb;
    }
    .evaluation-card header {
      position: static;
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
      border: 0;
      background: transparent;
      backdrop-filter: none;
    }
    .evaluation-card form { justify-self: start; }
    .evaluation-card button { min-height: 30px; padding: 4px 9px; }
    details { margin-top: 12px; }
    summary { cursor: pointer; color: var(--accent); font-weight: 700; }
    pre {
      overflow: auto;
      padding: 12px;
      border-radius: 6px;
      background: #172025;
      color: #eef7f8;
      font-size: 12px;
      line-height: 1.45;
    }
    .nav-row { display: flex; justify-content: space-between; gap: 10px; margin-top: 12px; }
    .flash { margin-bottom: 12px; }
    @media (max-width: 900px) {
      .topbar, main { width: min(100% - 20px, 1440px); }
      .topbar { grid-template-columns: 1fr; align-items: stretch; }
      .layout { grid-template-columns: 1fr; }
      .review-layout, .answer-layout { grid-template-columns: 1fr; }
      .attempt-sidebar { position: static; max-height: none; overflow: visible; }
      .metric-grid { grid-template-columns: 1fr; }
      th:first-child, td:first-child { min-width: 220px; }
      .calculator-form { grid-template-columns: 1fr; }
      .calculator-form label:first-of-type { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1 class="brand">Olympiad Scorer</h1>
        <nav class="crumbs">{% block crumbs %}<a href="{{ url_for('index') }}">Соревнования</a>{% endblock %}</nav>
      </div>
      <div class="reviewer-control">
        <label>Проверяющий
          <input id="global-reviewer" type="text" autocomplete="name" placeholder="Имя для новых проверок">
        </label>
      </div>
    </div>
  </header>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="stack flash">
          {% for category, message in messages %}
            <div class="warning">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
      startup: { typeset: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <script>
    function escapeHtml(value) {
      return value
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function protectMath(source) {
      const chunks = [];
      const pattern = /(\$\$[\s\S]+?\$\$|\$[^$\n]+?\$|\\\[[\s\S]+?\\\]|\\\([\s\S]+?\\\))/g;
      const protectedSource = source.replace(pattern, (match) => {
        const token = `@@MATH_${chunks.length}@@`;
        chunks.push(match);
        return token;
      });
      return { protectedSource, chunks };
    }
    function restoreMath(html, chunks) {
      return html.replace(/@@MATH_(\d+)@@/g, (_, index) => escapeHtml(chunks[Number(index)] || ''));
    }
    document.querySelectorAll('[data-markdown]').forEach((node) => {
      const source = node.textContent || '';
      const { protectedSource, chunks } = protectMath(source);
      const rendered = window.marked ? marked.parse(protectedSource) : escapeHtml(protectedSource);
      const sanitized = window.DOMPurify ? DOMPurify.sanitize(rendered) : rendered;
      node.innerHTML = restoreMath(sanitized, chunks);
    });
    if (window.MathJax) {
      MathJax.startup.promise.then(() => MathJax.typesetPromise(document.querySelectorAll('[data-markdown]')));
    }
    document.querySelectorAll('[data-score-set]').forEach((button) => {
      button.addEventListener('click', () => {
        const target = document.getElementById(button.dataset.scoreTarget);
        if (target) target.value = button.dataset.scoreSet;
      });
    });
    document.querySelectorAll('.calculator-form').forEach((form) => {
      const range = form.querySelector('[data-token-range]');
      const number = form.querySelector('[data-token-number]');
      if (!range || !number) return;
      const sync = (source, target) => {
        target.value = source.value;
      };
      range.addEventListener('input', () => sync(range, number));
      number.addEventListener('input', () => sync(number, range));
      form.addEventListener('submit', () => {
        range.disabled = true;
      });
    });
    const reviewerInput = document.getElementById('global-reviewer');
    const reviewerKey = 'olympiadScorerReviewer';
    function syncReviewerTargets(value) {
      document.querySelectorAll('input[name="evaluator"][data-global-reviewer]').forEach((input) => {
        input.value = (value || '').trim();
      });
      document.querySelectorAll('[data-reviewer-href]').forEach((link) => {
        const url = new URL(link.href, window.location.href);
        const trimmed = (value || '').trim();
        if (trimmed) url.searchParams.set('evaluator', trimmed);
        else url.searchParams.delete('evaluator');
        link.href = url.toString();
      });
    }
    function updateScoreForms() {
      const reviewerName = reviewerInput ? reviewerInput.value.trim() : '';
      document.querySelectorAll('form[data-score-form]').forEach((form) => {
        const submit = form.querySelector('[data-score-submit]');
        const message = form.querySelector('[data-reviewer-required-message]');
        const disabled = !reviewerName;
        if (submit) submit.disabled = disabled;
        if (message) message.hidden = !disabled;
      });
    }
    if (reviewerInput) {
      const storedReviewer = localStorage.getItem(reviewerKey) || '';
      reviewerInput.value = storedReviewer;
      syncReviewerTargets(storedReviewer);
      updateScoreForms();
      reviewerInput.addEventListener('input', () => {
        localStorage.setItem(reviewerKey, reviewerInput.value);
        syncReviewerTargets(reviewerInput.value);
        updateScoreForms();
      });
    }
    document.querySelectorAll('form').forEach((form) => {
      form.addEventListener('submit', (event) => {
        if (reviewerInput) syncReviewerTargets(reviewerInput.value);
        if (!form.matches('[data-score-form]')) return;
        if (reviewerInput && !reviewerInput.value.trim()) {
          event.preventDefault();
          updateScoreForms();
          reviewerInput.focus();
        }
      });
    });
  </script>
</body>
</html>
